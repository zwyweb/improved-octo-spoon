name: qopack-stable-ci

on:
  push:
  workflow_dispatch:

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    env:
      ZSTD_SYS_USE_PKG_CONFIG: 0
      LIBZSTD_NO_PKG_CONFIG: 1
      PKG_CONFIG_ALLOW_CROSS: 1

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libopus-dev libzstd-dev cmake build-essential

      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install opus zstd cmake pkg-config || true

      - name: Install deps (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install -y cmake ninja

      - name: Build
        run: cargo build -p bsx --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM
        env:
          RUSTFLAGS: --cfg getrandom_backend="wasm_js"
        run: cargo build -p bsx --release --target wasm32-unknown-unknown --no-default-features --features wasm

      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: target/wasm32-unknown-unknown/release/

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Android NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Add target
        run: rustup target add aarch64-linux-android

      - name: Build Android
        run: |
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export CC_aarch64_linux_android=aarch64-linux-android21-clang
          export AR_aarch64_linux_android=llvm-ar
          export ZSTD_SYS_USE_PKG_CONFIG=0
          export LIBZSTD_NO_PKG_CONFIG=1
          export PKG_CONFIG_ALLOW_CROSS=1
          cargo build -p bsx --release --target aarch64-linux-android --no-default-features --features android

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: target/aarch64-linux-android/release/
