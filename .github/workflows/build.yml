name: bsx-stable-build

on:
  push:
  workflow_dispatch:

env:
  CMAKE_ARGS: -DCMAKE_POLICY_VERSION_MINIMUM=3.5
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libopus-dev

      - name: Install Windows deps
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y cmake ninja

      - name: Build
        run: cargo build -p bsx --release --lib --features native --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip cmake ninja-build
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Add Android target
        run: rustup target add aarch64-linux-android

      - name: Build Android
        run: |
          export CC_aarch64_linux_android=aarch64-linux-android21-clang
          export CXX_aarch64_linux_android=aarch64-linux-android21-clang++
          export AR_aarch64_linux_android=llvm-ar
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android21-clang
          cargo build -p bsx --release --lib --features android --target aarch64-linux-android

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: target/aarch64-linux-android/release/
