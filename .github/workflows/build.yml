name: bsx-windows-only

on:
  push:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CMAKE_ARGS: -DCMAKE_POLICY_VERSION_MINIMUM=3.5

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake/Ninja
        run: choco install -y cmake ninja

      - name: Build release lib
        run: cargo build -p bsx --release --lib --features native --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsx-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/
