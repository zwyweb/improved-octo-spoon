name: stable-build

on:
  push:
  workflow_dispatch:

jobs:

# =========================
# NATIVE DESKTOP
# =========================
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    env:
      # force system libs instead of bundled C builds when possible
      ZSTD_SYS_USE_PKG_CONFIG: 1
      OPUS_NO_PKG_CONFIG: 0

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libopus-dev libzstd-dev cmake build-essential

      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install opus zstd cmake pkg-config || true

      - name: Install deps (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y cmake ninja

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/


# =========================
# WASM (SAFE MODE)
# =========================
  wasm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Build wasm (NO C-DEPS)
        run: |
          RUSTFLAGS="--cfg getrandom_backend=\"wasm_js\"" \
          cargo build --release --target wasm32-unknown-unknown --no-default-features --features wasm

      - name: Upload wasm
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: target/wasm32-unknown-unknown/release/


# =========================
# ANDROID (SAFE BUILD)
# =========================
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Add target
        run: rustup target add aarch64-linux-android

      - name: Build Android (disable C heavy deps)
        run: |
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export CC_aarch64_linux_android=aarch64-linux-android21-clang
          export AR_aarch64_linux_android=llvm-ar

          # IMPORTANT: feature-based safe build
          cargo build --release --target aarch64-linux-android --no-default-features --features android

      - name: Upload android
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: target/aarch64-linux-android/release/
